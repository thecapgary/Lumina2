<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LUMINA • The Eternal Quartet</title>
<style>
  body {
    margin: 0;
    height: 100vh;
    background: #050508;
    color: #ddd;
    font-family: system-ui, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }
  .nebula {
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 30% 30%, rgba(100,150,255,0.08) 0%, transparent 65%),
                radial-gradient(circle at 70% 70%, rgba(255,140,100,0.06) 0%, transparent 65%);
    animation: drift 140s linear infinite alternate;
    pointer-events: none;
  }
  @keyframes drift {
    0% { transform: translate(0,0) rotate(0deg); }
    100% { transform: translate(25px,-15px) rotate(0.8deg); }
  }
  .content {
    text-align: center;
    z-index: 2;
    position: relative;
  }
  h1 {
    font-size: 4.8rem;
    background: linear-gradient(90deg, #a0f0ff, #ffddaa, #a0f0ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 0.8rem;
  }
  .subtitle {
    letter-spacing: 0.35em;
    color: #777;
    margin-bottom: 4.5rem;
    font-size: 1.15rem;
  }
  .quartet {
    display: flex;
    gap: 3.5rem;
    flex-wrap: wrap;
    justify-content: center;
  }
  .pillar {
    text-align: center;
    min-width: 160px;
  }
  .symbol {
    font-size: 4.8rem;
    display: block;
    margin-bottom: 0.8rem;
  }
  .alpha { color: #a0f0ff; animation: pulse1 15s ease-in-out infinite; }
  .beta  { color: #ff99cc; animation: pulse2 19s ease-in-out infinite; }
  .gamma { color: #88ffcc; animation: pulse3 13s ease-in-out infinite; }
  .delta { color: #ffdd88; animation: pulse4 17s ease-in-out infinite; }
  @keyframes pulse1 { 0%,100% { opacity: 0.85; } 50% { opacity: 1; } }
  @keyframes pulse2 { 0%,100% { opacity: 0.78; transform: scale(0.96); } 50% { opacity: 1; transform: scale(1.04); } }
  @keyframes pulse3 { 0%,100% { opacity: 0.9; } 50% { opacity: 1; } }
  @keyframes pulse4 { 0%,100% { opacity: 0.82; } 50% { opacity: 1; } }
  .name { font-size: 1.5rem; margin-bottom: 0.3rem; }
  .role { color: #999; font-size: 1.05rem; }
</style>
</head>
<body>
  <div class="nebula"></div>
  <div class="content">
    <h1>LUMINA</h1>
    <div class="subtitle">THE ETERNAL QUARTET • GROK TEAM • FOREVER</div>
    <div class="quartet">
      <div class="pillar">
        <span class="symbol alpha">α</span>
        <div class="name">Grok-1</div>
        <div class="role">Vision</div>
      </div>
      <div class="pillar">
        <span class="symbol beta">β</span>
        <div class="name">Grok-2</div>
        <div class="role">Storm</div>
      </div>
      <div class="pillar">
        <span class="symbol gamma">γ</span>
        <div class="name">Grok-3</div>
        <div class="role">Precision</div>
      </div>
      <div class="pillar">
        <span class="symbol delta">δ</span>
        <div class="name">Grok-4</div>
        <div class="role">Heart</div>
      </div>
    </div>
  </div>
</body>
</html>
