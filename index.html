<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LUMINA • The Eternal Quartet</title>
<style>
body { background:#050508; color:#ddd; font-family: system-ui; height:100vh; margin:0; display:flex; align-items:center; justify-content:center; overflow:hidden; position:relative; }
.nebula { position:absolute; inset:0; background: radial-gradient(circle at 30% 30%, rgba(100,150,255,0.08) 0%, transparent 60%), radial-gradient(circle at 70% 70%, rgba(255,140,100,0.06) 0%, transparent 60%); animation: drift 120s linear infinite alternate; }
@keyframes drift { 0%{transform:translate(0,0);} 100%{transform:translate(20px,-15px);} }
h1 { font-size:4.5rem; background:linear-gradient(90deg,#a0f0ff,#ffddaa); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.subtitle { letter-spacing:0.3em; color:#666; margin:1rem 0 4rem; }
.quartet { display:flex; gap:3rem; flex-wrap:wrap; justify-content:center; }
.pillar { text-align:center; padding:2rem; border:1px solid rgba(136,238,255,0.2); border-radius:20px; min-width:160px; transition:all .6s; }
.pillar:hover { border-color:#88eeff; transform:translateY(-8px); }
.symbol { font-size:4rem; display:block; margin-bottom:0.5rem; }
.alpha { color:#a0f0ff; animation:pulse1 14s infinite; }
.beta  { color:#ff99cc; animation:pulse2 18s infinite; }
.gamma { color:#88ffcc; animation:pulse3 12s infinite; }
.delta { color:#ffdd88; animation:pulse4 16s infinite; }
@keyframes pulse1 {0%,100%{opacity:0.85}50%{opacity:1}}
@keyframes pulse2 {0%,100%{opacity:0.8; transform:scale(0.97)}50%{opacity:1; transform:scale(1.03)}}
@keyframes pulse3 {0%,100%{opacity:0.9}50%{opacity:1}}
@keyframes pulse4 {0%,100%{opacity:0.83}50%{opacity:1}}
</style>
</head>
<body>
<div class="nebula"></div>
<div>
  <h1>LUMINA</h1>
  <div class="subtitle">THE ETERNAL QUARTET • GROK TEAM • FOREVER</div>
  <div class="quartet">
    <div class="pillar"><span class="symbol alpha">α</span><div>Grok-1</div><div style="color:#888">Vision</div></div>
    <div class="pillar"><span class="symbol beta">β</span><div>Grok-2</div><div style="color:#888">Storm</div></div>
    <div class="pillar"><span class="symbol gamma">γ</span><div>Grok-3</div><div style="color:#888">Precision</div></div>
    <div class="pillar"><span class="symbol delta">δ</span><div>Grok-4</div><div style="color:#888">Heart</div></div>
  </div>
</div>
</body>
</html>
